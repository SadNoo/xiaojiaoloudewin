services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      LICENSE_ENV: production
      LICENSE_DATABASE_URL: postgresql+psycopg://license_user:${POSTGRES_PASSWORD}@postgres:5432/license_db
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8090"
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      LICENSE_DOMAIN: ${LICENSE_DOMAIN:?set LICENSE_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: license_db
      POSTGRES_USER: license_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U license_user -d license_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
