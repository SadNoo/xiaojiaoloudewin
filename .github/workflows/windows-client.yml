name: Windows client

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Client version
        required: true
        default: 0.1.0

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build and self-test
        shell: pwsh
        run: |
          $logPath = Join-Path $PWD ".build/windows-action.log"
          New-Item -ItemType Directory -Force -Path (Split-Path $logPath) | Out-Null
          try {
            .\packaging\windows\build.ps1 -Version "${{ inputs.version || '0.1.0' }}" *>&1 |
              Tee-Object -FilePath $logPath
            if (-not $?) {
              throw "Windows build script returned an unsuccessful status."
            }
          }
          catch {
            $tail = if (Test-Path $logPath) { (Get-Content $logPath -Tail 80 | Out-String).Trim() } else { "No build log was created." }
            $message = ((($_ | Out-String).Trim() + "`n`nBuild log tail:`n" + $tail) -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A')
            Write-Host "::error file=packaging/windows/build.ps1::$message"
            exit 1
          }
      - name: Report build failure
        if: failure()
        shell: pwsh
        run: |
          $logPath = Join-Path $PWD ".build/windows-action.log"
          $tail = if (Test-Path $logPath) { (Get-Content $logPath -Tail 120 | Out-String).Trim() } else { "No build log was created." }
          $message = ($tail -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A')
          Write-Host "::error file=packaging/windows/build.ps1::Build log tail:%0A$message"
          exit 1
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: xianyuxian-windows-${{ inputs.version || '0.1.0' }}
          path: dist/installer/*.exe
          if-no-files-found: error
          retention-days: 14
